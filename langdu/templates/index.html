<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>朗读文档</title>

<!-- PWA：让网页可以“添加到主屏幕”，全屏像 App 一样打开 -->
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#4f7cf0">
<link rel="icon" href="/static/favicon-32.png" sizes="32x32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="朗读文档">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
    background: linear-gradient(160deg, #eef3fb 0%, #f7f5ef 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 12px;
    color: #2b3145;
  }
  .card {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 10px 40px rgba(60, 80, 130, 0.12);
    width: 100%;
    max-width: 560px;
    padding: 16px;
  }

  /* 标题：居中，无副标题 */
  h1 { font-size: 22px; text-align: center; margin-bottom: 12px; }

  /* 合并输入框：上传文件 + 粘贴文字，同一个框 */
  .inputbox { border: 2px solid #d7deec; border-radius: 14px; overflow: hidden; }
  .drop { padding: 12px; text-align: center; cursor: pointer; color: #6b7390; transition: background .2s; }
  .drop:hover, .drop.over { background: #f3f7ff; }
  .drop .big { font-size: 15px; color: #3c4566; white-space: nowrap; }
  .drop .small { font-size: 12px; margin-top: 3px; }
  .filename { margin-top: 6px; font-size: 13px; color: #4f7cf0; display: none; word-break: break-all; }
  #fileInput { display: none; }
  .or { text-align: center; font-size: 12px; color: #aab0c2; padding-bottom: 4px; }
  textarea {
    display: block; width: 100%; height: 60px; resize: vertical;
    border: none; border-top: 1.5px solid #eef1f8; outline: none;
    padding: 10px 12px; font-size: 14px; line-height: 1.6; color: #2b3145; background: #fafbfe;
  }
  .charCount { font-size: 12px; color: #8a90a3; margin-top: 4px; text-align: right; min-height: 14px; }

  /* 开始朗读 / 暂停 / 停止 */
  .btnRow { display: flex; gap: 8px; margin-top: 10px; }
  .btn {
    flex: 1;
    background: linear-gradient(135deg, #4f7cf0, #6b5ef0);
    color: #fff; border: none; border-radius: 10px;
    padding: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .btn:hover { opacity: .92; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn.secondary {
    background: #eef1f8; color: #4f5670; flex: 0 0 auto;
    padding: 12px 14px; font-size: 14px; font-weight: 500;
  }

  .status { margin-top: 10px; font-size: 13px; text-align: center; display: none; }
  .status.info { color: #4f7cf0; display: block; }
  .status.error { color: #e05656; display: block; }
  audio { width: 100%; margin-top: 10px; display: none; }

  .section { margin-top: 12px; }
  .label { font-size: 14px; font-weight: 600; margin-bottom: 7px; }

  /* 语速 */
  .speedRow { display: flex; align-items: center; gap: 12px; }
  input[type=range] { flex: 1; accent-color: #4f7cf0; }
  .speedVal { width: 50px; text-align: right; font-size: 13px; color: #4f7cf0; font-weight: 600; }

  /* 选择声音：两行两列（上面两个男声，下面两个女声）*/
  .voices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .voice {
    border: 2px solid #e3e7f2; border-radius: 10px;
    padding: 6px 3px; text-align: center; cursor: pointer;
    transition: all .15s; user-select: none;
  }
  .voice .icon { font-size: 20px; line-height: 1.1; }
  .voice .name { font-size: 14px; font-weight: 600; margin-top: 1px; }
  .voice .gender { font-size: 10px; color: #4f7cf0; }
  .voice .desc { font-size: 10px; color: #8a90a3; margin-top: 1px; }
  .voice.active { border-color: #4f7cf0; background: #f3f7ff; }

  /* 朗读进度（段落列表） */
  /* 朗读时的文字：铺满、随页面一起滑，不再关在小框里单独滚 */
  .segments {
    margin-top: 14px;
    border: 1.5px solid #eef1f8; border-radius: 12px; padding: 6px; display: none;
  }
  .seg {
    padding: 11px 12px; border-radius: 8px; font-size: 16px; line-height: 1.9;
    cursor: pointer; transition: background .12s; color: #4f5670; display: flex; gap: 10px;
  }
  .seg:hover { background: #f3f7ff; }
  .seg .num { color: #b9c0d4; font-size: 12px; flex: 0 0 26px; padding-top: 2px; }
  .seg.playing { background: #eaf1ff; color: #2b3145; }
  .seg.playing .num { color: #4f7cf0; font-weight: 700; }
  .seg.done { color: #aab0c2; }
</style>
</head>
<body>
<div class="card">
  <h1>📖 朗读文档</h1>

  <!-- 合并输入框：可上传文件，也可直接粘贴文字 -->
  <div class="inputbox">
    <div class="drop" id="drop">
      <div class="big">点击选择 / 拖入文档</div>
      <div class="small">支持 Word / PDF / TXT / Markdown</div>
      <div class="filename" id="filename"></div>
    </div>
    <div class="or">— 或 直接粘贴 / 输入文字 —</div>
    <textarea id="text" placeholder="把要朗读的文字粘贴到这里"></textarea>
  </div>
  <input type="file" id="fileInput" accept=".docx,.pdf,.txt,.md,.markdown,application/pdf">
  <div class="charCount" id="charCount"></div>

  <!-- 开始朗读 / 暂停 / 停止 -->
  <div class="btnRow">
    <button class="btn" id="playBtn" disabled>🔊 开始朗读</button>
    <button class="btn secondary" id="pauseBtn" disabled>⏸ 暂停</button>
    <button class="btn secondary" id="stopBtn" disabled>⏹ 停止</button>
  </div>

  <div class="status" id="status"></div>
  <audio id="player" controls></audio>

  <!-- 语速：放在开始朗读下方 -->
  <div class="section">
    <div class="label">语速</div>
    <div class="speedRow">
      <span style="font-size:13px;color:#8a90a3">慢</span>
      <input type="range" id="speed" min="-50" max="50" step="10" value="0">
      <span style="font-size:13px;color:#8a90a3">快</span>
      <span class="speedVal" id="speedVal">原速</span>
    </div>
  </div>

  <!-- 选择声音：放在最下面，两行三个 -->
  <div class="section">
    <div class="label">选择声音</div>
    <div class="voices" id="voices">
      {% for vid, v in voices.items() %}
      <div class="voice {% if vid == default_voice %}active{% endif %}" data-voice="{{ vid }}">
        <div class="icon">{{ v.emoji }}</div>
        <div class="name">{{ v.name }}</div>
        <div class="gender">{{ v.gender }}</div>
        <div class="desc">{{ v.desc }}</div>
      </div>
      {% endfor %}
    </div>
  </div>

  <div class="segments" id="segments"></div>
</div>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('fileInput');
const filenameEl = document.getElementById('filename');
const textEl = document.getElementById('text');
const charCount = document.getElementById('charCount');
const playBtn = document.getElementById('playBtn');
const pauseBtn = document.getElementById('pauseBtn');
const stopBtn = document.getElementById('stopBtn');
const statusEl = document.getElementById('status');
const player = document.getElementById('player');
const speedEl = document.getElementById('speed');
const speedVal = document.getElementById('speedVal');
const segmentsEl = document.getElementById('segments');

let voice = '{{ default_voice }}';

// 朗读引擎的状态
let segments = [];        // 分好的段落文字
let audioCache = {};      // 已生成的语音（按段缓存）
let current = -1;         // 当前正在读第几段
let playing = false;      // 是否处于朗读流程中

// ---- 声音选择 ----
document.querySelectorAll('.voice').forEach(el => {
  el.onclick = () => {
    document.querySelectorAll('.voice').forEach(v => v.classList.remove('active'));
    el.classList.add('active');
    voice = el.dataset.voice;
    audioCache = {};   // 换了声音，之前生成的作废
  };
});

// ---- 语速 ----
speedEl.oninput = () => {
  const v = parseInt(speedEl.value);
  speedVal.textContent = v === 0 ? '原速' : (v > 0 ? '+' + v + '%' : v + '%');
  audioCache = {};     // 换了语速，之前生成的作废
};

// ---- 文件选择与拖拽 ----
drop.onclick = () => fileInput.click();
drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
drop.ondragleave = () => drop.classList.remove('over');
drop.ondrop = e => {
  e.preventDefault();
  drop.classList.remove('over');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
};
fileInput.onchange = () => { if (fileInput.files.length) handleFile(fileInput.files[0]); };

function setStatus(msg, type) {
  statusEl.textContent = msg || '';
  statusEl.className = 'status' + (type ? ' ' + type : '');
}

// 文字框内容变化时：更新字数、决定“开始朗读”能不能点
function refreshText() {
  const n = textEl.value.trim().length;
  charCount.textContent = n ? ('共 ' + n + ' 个字') : '';
  playBtn.disabled = (n === 0);
}
textEl.addEventListener('input', refreshText);

async function handleFile(file) {
  filenameEl.textContent = '📄 ' + file.name;
  filenameEl.style.display = 'block';
  setStatus('正在读取文档…', 'info');
  stopReading();

  const form = new FormData();
  form.append('file', file);
  try {
    const resp = await fetch('/api/extract', { method: 'POST', body: form });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || '读取失败');
    textEl.value = data.text;
    refreshText();
    setStatus('文档读取成功，点击「开始朗读」即可', 'info');
  } catch (err) {
    setStatus('❌ ' + err.message, 'error');
  }
}

// ---- 把长文字分成适合朗读的小段（只在句末标点处断，标题单独成段）----
function isHeading(s) {
  return /^[一二三四五六七八九十]{1,3}、/.test(s) || /^\d{1,2}[.、]\s*\S/.test(s);
}
// 合成时用"大块"（约 400 字）一次合成：让引擎自己连贯地读多段，接缝最少、最顺
function splitSegments(text, maxChars = 400) {
  // 1) 先把每个换行块按句末标点切成"句子"，标题单独标记
  const units = [];
  for (const line of text.split(/\n+/)) {
    const t = line.trim();
    if (!t) continue;
    if (isHeading(t)) { units.push({ t, head: true }); continue; }
    for (let s of t.split(/(?<=[。！？!?；;…])/)) {
      s = s.trim();
      if (s) units.push({ t: s, head: false });
    }
  }
  // 2) 标题单独成段；普通句子累积到 maxChars 再断（绝不切断词）
  const segs = [];
  let buf = '';
  const flush = () => { if (buf.trim()) { segs.push(buf.trim()); buf = ''; } };
  for (const u of units) {
    if (u.head) { flush(); segs.push(u.t); continue; }
    if (!buf) buf = u.t;
    else if ((buf + u.t).length <= maxChars) buf += u.t;
    else { flush(); buf = u.t; }
    if (buf.length >= maxChars) flush();
  }
  flush();
  // 3) 兜底：极长又没有标点的句子才硬切（少见）
  const out = [];
  for (const s of segs) {
    if (s.length <= maxChars * 2) out.push(s);
    else for (let i = 0; i < s.length; i += maxChars) out.push(s.slice(i, i + maxChars));
  }
  // 4) 配停顿：去掉生硬的长停顿，只留极小的自然衔接（接缝在大块之间，已很少）
  return out.map(t => ({
    text: t,
    pause: isHeading(t) ? 250 : 120
  }));
}

// ---- 渲染段落列表 ----
function renderSegments() {
  segmentsEl.innerHTML = '';
  segments.forEach((seg, i) => {
    const div = document.createElement('div');
    div.className = 'seg';
    div.dataset.index = i;
    div.innerHTML = '<span class="num">' + (i + 1) + '</span><span>' + escapeHtml(seg.text) + '</span>';
    div.onclick = () => { playFrom(i); };
    segmentsEl.appendChild(div);
  });
  segmentsEl.style.display = segments.length ? 'block' : 'none';
}

function escapeHtml(s) {
  return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
}

function highlight(i) {
  segmentsEl.querySelectorAll('.seg').forEach(el => {
    const idx = parseInt(el.dataset.index);
    el.classList.toggle('playing', idx === i);
    el.classList.toggle('done', idx < i);
  });
  const cur = segmentsEl.querySelector('.seg.playing');
  // 正在读的那段自动滚到屏幕中间，边听边看不用手动滑
  if (cur) cur.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

// ---- 生成某一段的语音（带缓存）----
async function fetchSegment(i) {
  if (audioCache[i]) return audioCache[i];
  const resp = await fetch('/api/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text: segments[i].text, voice: voice, speed: parseInt(speedEl.value) })
  });
  if (!resp.ok) {
    const data = await resp.json().catch(() => ({}));
    throw new Error(data.error || '语音合成失败');
  }
  const url = URL.createObjectURL(await resp.blob());
  audioCache[i] = url;
  return url;
}

// ---- 从第 i 段开始朗读 ----
async function playFrom(i) {
  if (i < 0 || i >= segments.length) { finishReading(); return; }
  playing = true;
  current = i;
  updateButtons();
  highlight(i);
  setStatus('正在朗读 第 ' + (i + 1) + ' / ' + segments.length + ' 段…', 'info');
  player.style.display = 'block';

  let url;
  try {
    url = await fetchSegment(i);
  } catch (err) {
    setStatus('❌ ' + err.message, 'error');
    stopReading();
    return;
  }
  if (!playing || current !== i) return;

  player.src = url;
  player.play();
  if (i + 1 < segments.length) fetchSegment(i + 1).catch(() => {});
}

// 一段读完，停顿一下再接下一段（段落间停得久一点，更自然）
player.onended = () => {
  if (!playing) return;
  const justFinished = current;
  const gap = (segments[justFinished] && segments[justFinished].pause) || 300;
  setTimeout(() => {
    if (playing && current === justFinished) playFrom(current + 1);
  }, gap);
};

function finishReading() {
  setStatus('✅ 全部朗读完毕', 'info');
  stopReading();
}

function stopReading() {
  playing = false;
  current = -1;
  player.pause();
  highlight(-1);
  updateButtons();
}

function updateButtons() {
  stopBtn.disabled = !playing;
  pauseBtn.disabled = !playing;
  pauseBtn.textContent = (playing && player.paused) ? '▶ 继续' : '⏸ 暂停';
}

// ---- 按钮 ----
playBtn.onclick = () => {
  const text = textEl.value.trim();
  if (!text) { setStatus('❌ 没有可朗读的文字', 'error'); return; }
  segments = splitSegments(text);
  audioCache = {};
  renderSegments();
  setStatus('正在准备语音，请稍候…', 'info');
  playFrom(0);
};

pauseBtn.onclick = () => {
  if (!playing) return;
  if (player.paused) { player.play(); setStatus('继续朗读…', 'info'); }
  else { player.pause(); setStatus('已暂停，点「继续」接着读', 'info'); }
  updateButtons();
};

stopBtn.onclick = () => {
  stopReading();
  setStatus('已停止', 'info');
};

player.onplay = updateButtons;
player.onpause = updateButtons;

// 注册 Service Worker（让它能“添加到主屏幕”、二次打开更快）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
